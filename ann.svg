  </defs>

  <rect x="0" y="0" width="920" height="170" rx="18" fill="url(#bg)"/>
  <rect x="24" y="24" width="6" height="122" rx="3" fill="url(#line)"/>

  <text x="52" y="52"
        font-family="Segoe UI, Arial, Helvetica, sans-serif"
